name: CI Pipeline for Code Quality and Deployment

on:
  # Stage A: Runs on pull requests to main branch for code quality checks
  pull_request:
    branches: [main]

  # Stage B: Runs on merging Pull Requests to main branch for final checks and deployment
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  ci-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node Environment using version 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Format Code with Prettier
        run: npx prettier --check .

      - name: Static Analysis (Lint code)
        run: npx eslint src/ --quiet

      - name: Run Unit Tests
        run: npm test -- --watchAll=false

      - name: Build Application
        run: npm run build

  deploy:
    needs: ci-build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Test Deployment
        run: echo "Deploying to production environment..."
